AWSTemplateFormatVersion: '2010-09-09'
Description: Create a VPC and EC2 Instance

Parameters:
  InstanceType:
    Type: String
    Default: t2.micro

Resources:

  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16

  MySubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH
      VpcId: !Ref MyVPC

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: ami-0c02fb55956c7d316

Outputs:
  VPCId:
    Value: !Ref MyVPC

  InstanceId:
    Value: !Ref MyEC2Instance